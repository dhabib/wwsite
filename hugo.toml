baseURL = 'https://wrenswatch.com/'
languageCode = 'en-us'
title = "Wren's Watch"
theme = 'PaperMod'

# Enable features
enableRobotsTXT = true
enableEmoji = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  # Site description
  description = "AI-powered tools and analysis for the content economy"
  author = "Wren's Watch"

  # Logo/label in navbar
  [params.label]
    text = " "
    icon = "images/icon.png"
    iconHeight = 30

  # Profile mode for landing page - logo and social links only
  [params.profileMode]
    enabled = true
    title = ""
    subtitle = ""
    imageUrl = "images/wrenswatchlogo.png"
    imageWidth = 300
    imageHeight = 300
    imageTitle = ""

  # Social icons
  [[params.socialIcons]]
    name = "email"
    url = "mailto:contact@wrenswatch.com"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/wrenswatch"

  [[params.socialIcons]]
    name = "bluesky"
    url = "https://bsky.app/profile/wrenswatch.bsky.social"

  [[params.socialIcons]]
    name = "threads"
    url = "https://www.threads.net/@wrenswatch"

  [[params.socialIcons]]
    name = "mastodon"
    url = "https://mastodon.social/@wortheverypenny"

  # Appearance - KeepIt style (clean, minimal)
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  UseHugoToc = true
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  # Cover image config for book pages
  [params.cover]
    linkFullImages = true
    responsiveImages = true

[[menu.main]]
  identifier = "santayana"
  name = "Santayana"
  url = "https://santayana.org"
  weight = -1

[[menu.main]]
  identifier = "software"
  name = "Software"
  url = "/software/"
  weight = 1

[[menu.main]]
  identifier = "books"
  name = "Books"
  url = "/books/"
  weight = 2

[[menu.main]]
  identifier = "labs"
  name = "Labs"
  url = "/labs/"
  weight = 3

[[menu.main]]
  identifier = "newsletter"
  name = "Newsletter"
  url = "/newsletter/"
  weight = 4

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
